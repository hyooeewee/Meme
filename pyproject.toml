[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "pymeme"
version = "0.2.0"
description = "A centralized, tiered memory system with knowledge graph for AI assistants"
readme = "README.md"
license = "MIT"
requires-python = ">=3.12"
dependencies = [
    "pyyaml",
    "requests",
    "keyring",
    "cryptography",
]

[project.scripts]
meme = "meme.core:main"

[tool.hatch.build.targets.wheel]
packages = ["meme"]
