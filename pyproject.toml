[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "memectl"
version = "0.2.3"
description = "A centralized, tiered memory system with knowledge graph for AI assistants"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
dependencies = [
    "pyyaml",
    "requests",
    "keyring",
    "cryptography",
    "tomli>=1.2.0",
]

[project.scripts]
meme = "meme.core:main"

[tool.hatch.build.targets.wheel]
packages = ["src/meme"]
